  - id: debt-001
    category: hotspot
    severity: high
    location: src/core/init.ts:71
    title: initProject complexity 34 in highest-churn file
    detail: >
      initProject has cyclomatic complexity 34 (threshold 10). src/core/init.ts
      churns every 12 commits — every future change to project initialisation
      risks introducing bugs in untested branches. Function handles detection,
      config writing, directory setup, skill installation, git hooks, and CI
      generation in a single pass.
    metrics:
      complexity: 34
      churn: 12
      hotspot_score: 408
    suggestion: >
      Extract into focused steps: detectEnvironment(), writeConfig(),
      scaffoldDirs(), installSkills(), configureHooks(), generateCi(). Each
      under complexity 5, independently testable.
    effort: large
    consequences: >
      Every new init option adds another branch to an already-unmaintainable
      function. Bug in one phase silently affects others. Hard to test edge
      cases (e.g. partial init recovery).
    causes: evolution
    quadrant: inadvertent-prudent
    status: open
    first_detected: 2026-05-22
    last_detected: 2026-05-22

