  - id: debt-004
    category: hotspot
    severity: high
    location: src/core/check.ts:88
    title: runStep complexity 19 in recently-touched file
    detail: >
      runStep has cyclomatic complexity 19. src/core/check.ts churns every 6
      commits and was just modified. Single function dispatches all check
      types (llm, shell, complexity, test_quality, doc_style) via if-chains.
      Adding a new check type always touches this function.
    metrics:
      complexity: 19
      churn: 6
      hotspot_score: 114
    suggestion: >
      Replace if-chain dispatch with a handler map keyed by check name/type.
      Each handler is a self-contained function. New check types register
      themselves — runStep shrinks to a lookup.
    effort: medium
    consequences: >
      Every new check type increases complexity further. Easy to accidentally
      break an existing check type when adding a new one. Hard to unit test
      individual check paths in isolation.
    causes: evolution
    quadrant: inadvertent-prudent
    status: open
    first_detected: 2026-05-22
    last_detected: 2026-05-22

